name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write

jobs:
  pre-commit:
    name: pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

  shell-syntax:
    name: Shell syntax validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install ZSH
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Check ZSH syntax
        run: zsh -n zshrc

      - name: Check Makefile
        run: make help >/dev/null

  startup-time:
    name: ZSH startup performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install ZSH
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Measure ZSH startup
        run: |
          export PATH="$PWD:$PATH"
          TIMEFORMAT='startup: %Rs'
          elapsed=$( { time zsh -ic exit >/dev/null 2>&1; } 2>&1 )
          echo "$elapsed"
          ms=$(echo "$elapsed" | grep -oP '[\d.]+')
          awk -v t="$ms" 'BEGIN { if (t+0 > 0.110) { print "FAIL: " t "s exceeds 110ms target"; exit 1 } else { print "OK: " t "s (target <0.110s)" } }'

  security-scan:
    name: Security scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-check:
    name: Dependency vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check for hardcoded secrets
        run: |
          if grep -rn \
            -e 'password\s*=' \
            -e 'api_key\s*=' \
            -e 'secret\s*=' \
            --include="*.zsh" \
            --include="*.sh" \
            --include="*.conf" \
            --include="*.env" \
            --exclude-dir=.git \
            --exclude-dir=.pre-commit \
            . 2>/dev/null | grep -v '^\s*#'; then
            echo "FAIL: potential hardcoded secrets detected"
            exit 1
          fi
          echo "OK: no hardcoded secrets found"
