name: CI - pre-commit & security scans

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  pre-commit:
    name: pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.0

  security-scan:
    name: Security scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-check:
    name: Dependency vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for known vulnerabilities
        run: |
          echo "Checking for hardcoded secrets and vulnerable patterns..."
          if grep -r "password\|secret\|api_key\|token" . --include="*.sh" --include="*.zsh" --include="*.conf" --exclude-dir=.git 2>/dev/null | grep -v "# " | grep -v ".pre-commit"; then
            echo "⚠️  WARNING: Potential hardcoded secrets detected in configuration files"
            exit 1
          fi
          echo "✓ No obvious hardcoded secrets found"
