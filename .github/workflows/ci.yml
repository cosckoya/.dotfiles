name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write

jobs:
  pre-commit:
    name: pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

  shell-syntax:
    name: Shell syntax validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install ZSH
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Check ZSH syntax
        run: zsh -n zshrc

      - name: Check Makefile
        run: make help >/dev/null

  startup-time:
    name: ZSH startup performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install ZSH
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Install dotfiles
        run: |
          ln -sf "$PWD/zshrc" "$HOME/.zshrc"
          ln -sf "$PWD/zsh.d" "$HOME/.zsh.d"

      - name: Pre-warm ZSH (install plugins, build compinit cache)
        run: |
          zsh -i -c exit 2>&1 | tail -5 || true
        shell: bash

      - name: Measure ZSH startup
        run: |
          TIMEFORMAT="%R"
          elapsed=$( { time zsh -i -c exit 2>/dev/null; } 2>&1 ) || true
          elapsed_ms=$(echo "$elapsed" | LC_ALL=C awk 'END { printf "%.0f", $1 * 1000 }')
          echo "ZSH startup: ${elapsed_ms}ms"
          if (( elapsed_ms > 110 )); then
            echo "FAIL: ${elapsed_ms}ms exceeds 110ms target"
            exit 1
          else
            echo "OK: ${elapsed_ms}ms (target <110ms)"
          fi
        shell: bash

  security-scan:
    name: Security scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@3ce22a6e336a7fcc318bc58ae1986395bdc83ba7  # v4.35.4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-check:
    name: Dependency vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Check for hardcoded secrets
        run: |
          if grep -rn \
            -e 'password\s*=' \
            -e 'api_key\s*=' \
            -e 'secret\s*=' \
            --include="*.zsh" \
            --include="*.sh" \
            --include="*.conf" \
            --include="*.env" \
            --exclude-dir=.git \
            --exclude-dir=.pre-commit \
            . 2>/dev/null | grep -v '^\s*#'; then
            echo "FAIL: potential hardcoded secrets detected"
            exit 1
          fi
          echo "OK: no hardcoded secrets found"
